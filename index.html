<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf6f0" />
  <title>家庭の献立コンシェルジュ</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">🍱</div>
      <div>
        <div class="brand-title">家庭の献立コンシェルジュ</div>
        <div class="brand-sub">家族の好みと栄養を、毎日の食卓へ</div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero fade-in">
      <h1>毎日の食卓に、<br>新しいインスピレーションを。</h1>
      <p>あなたの好みや気分に合わせて、専属のAIコンシェルジュが最適な献立をご提案します。</p>
      <div class="pill" id="statusPill">今日の提案: 未設定</div>
    </section>

    <div class="section-title">本日のサマリー</div>
    <div class="stat-grid fade-in">
      <div class="stat-card">
        <div class="stat-label">🕐 最新の記録</div>
        <div class="stat-val" id="homeHistory">記録なし</div>
      </div>
      <div class="stat-card" onclick="location.href='shopping.html'" style="cursor:pointer;">
        <div class="stat-label">🛒 買い物リスト</div>
        <div class="stat-val"><span id="homeShoppingCount">0</span> 件</div>
      </div>
    </div>

    <!-- お気に入りセクション（折りたたみ式） -->
    <section class="panel fade-in" style="margin-top:16px;">
      <div class="filter-header" id="favToggleHeader" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;"><span class="icon gold">⭐</span> お気に入りレシピ (<span id="homeFavCountBadge">0</span>)</h3>
        <span class="filter-toggle-icon" id="favArrow">▼</span>
      </div>
      <div id="favBody" style="display:none; margin-top:12px;">
        <div id="homeFavoritesList" class="menu-list fade-in" style="margin-top:0;">
          <!-- JavaScriptでお気に入りを描画 -->
        </div>
      </div>
    </section>

    <div class="section-title">クイックアクセス</div>
    <div class="quick-actions fade-in">
      <a class="quick-btn" href="menu.html">
        <div class="quick-icon" style="background:#f0d4c8;">🍽️</div>
        <div class="quick-label">献立を選ぶ</div>
        <div class="quick-sub">今日のメニューを決定</div>
      </a>
      <a class="quick-btn" href="profile.html">
        <div class="quick-icon" style="background:#c8e6d8;">👨‍👩‍👧</div>
        <div class="quick-label">プロフィール</div>
        <div class="quick-sub">家族の好みを登録</div>
      </a>
      <a class="quick-btn" href="shopping.html">
        <div class="quick-icon" style="background:#f5e9d0;">🛒</div>
        <div class="quick-label">買い物リスト</div>
        <div class="quick-sub">必要な食材を確認</div>
      </a>
      <a class="quick-btn" href="history.html">
        <div class="quick-icon" style="background:#e8ddd0;">📖</div>
        <div class="quick-label">食事の記録</div>
        <div class="quick-sub">作った献立の履歴</div>
      </a>
    </div>

    <!-- 使い方セクション削除 -->
  </main>

  <nav class="nav">
    <a class="active" href="index.html"><span class="nav-icon">🏠</span><span class="nav-label">ホーム</span></a>
    <a href="profile.html"><span class="nav-icon">👨‍👩‍👧</span><span class="nav-label">プロフィール</span></a>
    <a href="menu.html"><span class="nav-icon">🍽️</span><span class="nav-label">献立</span></a>
    <a href="shopping.html"><span class="nav-icon">🛒</span><span class="nav-label">買い物</span></a>
    <a href="history.html"><span class="nav-icon">📖</span><span class="nav-label">記録</span></a>
  </nav>

  <script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
