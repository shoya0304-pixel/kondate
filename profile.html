<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>プロフィール | 献立コンシェルジュ</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">👨‍👩‍👧</div>
      <div>
        <div class="brand-title">家族プロフィール</div>
        <div class="brand-sub">好み・制限・目標を登録して献立を最適化</div>
      </div>
    </div>
  </header>

  <main>
    <section class="panel fade-in" id="profilePanel">
      <div class="locked-banner" id="lockedBanner" style="display:none;">
        <span class="locked-text">✅ プロフィール保存済み</span>
        <button class="btn ghost" id="editProfile" type="button" style="padding:6px 14px;font-size:12px;">編集する</button>
      </div>

      <h3><span class="icon orange">🙅</span>苦手・アレルギー</h3>
      <div class="form-grid">
        <div class="field">
          <label>家族の苦手食材（カンマ区切りで5〜10個）</label>
          <input class="input" id="dislikes" placeholder="例: セロリ, しいたけ, パクチー, なす" />
        </div>
        <div class="field">
          <label>アレルギー・宗教上の制限（カンマ区切り）</label>
          <input class="input" id="allergies" placeholder="例: 甲殻類, ピーナッツ, 乳製品" />
        </div>
      </div>

      <div class="divider"></div>
      <h3><span class="icon green">🍜</span>好みとスタイル</h3>
      <div class="form-grid">
        <div class="field">
          <label>好きな料理ジャンル</label>
          <div class="chip-group" id="genreChips">
            <span class="chip">和食</span>
            <span class="chip">洋食</span>
            <span class="chip">中華</span>
            <span class="chip">エスニック</span>
            <span class="chip">韓国</span>
            <span class="chip">ヘルシー</span>
            <span class="chip">イタリアン</span>
            <span class="chip">スパイシー</span>
          </div>
        </div>
        <div class="field">
          <label>調理可能時間（分）</label>
          <div class="field-hint">平日・休日それぞれ数字で入力（例: 平日 25、休日 50）</div>
          <div class="row">
            <div style="flex:1;">
              <div style="font-size:11px;color:var(--ink-3);margin-bottom:4px;">平日（例: 25）</div>
              <input class="input" id="weekdayTime" type="number" min="5" max="120" placeholder="25" />
            </div>
            <div style="flex:1;">
              <div style="font-size:11px;color:var(--ink-3);margin-bottom:4px;">休日（例: 50）</div>
              <input class="input" id="weekendTime" type="number" min="5" max="180" placeholder="50" />
            </div>
          </div>
        </div>
        <div class="field">
          <label>作る人数（何人前）</label>
          <input class="input" id="servings" type="number" min="1" max="10" placeholder="例: 3" />
        </div>
      </div>

      <div class="divider"></div>
      <h3><span class="icon gold">🥗</span>健康・在庫管理</h3>
      <div class="form-grid">
        <div class="field">
          <label>活動量・健康目標</label>
          <input class="input" id="goal" placeholder="例: ダイエット / 筋力増強 / たんぱく質多め" />
        </div>
        <div class="field">
          <label>ダークモード設定</label>
          <div style="display:flex; align-items:center; justify-content:space-between;">
            <span style="font-size:13px;">ダークトーンの画面にする</span>
            <div class="toggle" id="themeToggle"></div>
          </div>
        </div>
        <div class="field">
          <label>常備食材・よく使う調味料（カンマ区切り）</label>
          <input class="input" id="pantry" placeholder="例: 味噌, 醤油, 卵, 冷凍野菜, オリーブオイル" />
        </div>
        <div class="field">
          <label>🧊 冷蔵庫メモ（期限・使い切りたい食材）</label>
          <textarea class="textarea" id="fridgeMemo" placeholder="例: ほうれん草は明日まで / 牛乳は残り少&#10;豆腐使い切りたい / 卵3個残っている"></textarea>
        </div>
      </div>

      <div class="row" style="margin-top:16px; gap:10px;">
        <button class="btn" id="saveProfile" type="button">💾 保存して献立へ</button>
        <button class="btn secondary" id="clearProfile" type="button">リセット</button>
      </div>
      <div class="row" style="margin-top:10px;">
        <span class="badge" id="profileStatus">未保存</span>
      </div>
    </section>
  </main>

  <nav class="nav">
    <a href="index.html"><span class="nav-icon">🏠</span><span class="nav-label">ホーム</span></a>
    <a class="active" href="profile.html"><span class="nav-icon">👨‍👩‍👧</span><span class="nav-label">プロフィール</span></a>
    <a href="menu.html"><span class="nav-icon">🍽️</span><span class="nav-label">献立</span></a>
    <a href="shopping.html"><span class="nav-icon">🛒</span><span class="nav-label">買い物</span></a>
    <a href="history.html"><span class="nav-icon">📖</span><span class="nav-label">記録</span></a>
  </nav>

  <script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
