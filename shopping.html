<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>買い物リスト | 献立コンシェルジュ</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">🛒</div>
      <div>
        <div class="brand-title">買い物リスト</div>
        <div class="brand-sub">作った献立の材料が自動で追加されます</div>
      </div>
    </div>
  </header>

  <main>
    <section class="panel fade-in">
      <h3><span class="icon orange">➕</span>食材を追加</h3>
      <div class="row">
        <input class="input" id="addItem" placeholder="追加したい食材を入力..." style="flex:1;" />
        <button class="btn" id="addItemBtn" type="button">追加</button>
      </div>
    </section>

    <section class="panel fade-in">
      <h3>
        <span class="icon green">🥦</span>
        <span id="shoppingCountLabel">必要な食材</span>
        <span class="badge" id="shopCountBadge" style="margin-left:auto;">0件</span>
      </h3>
      <div class="shopping-list" id="shoppingList">
        <div class="empty">
          <div class="empty-icon">🛒</div>
          <div class="empty-text">まだリストが空です。<br>献立を作るとここに食材が追加されます。</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="row" style="gap:8px;">
        <button class="btn secondary" id="copyList" type="button">📋 リストをコピー</button>
        <button class="btn secondary" id="clearDone" type="button">✓ チェック済みを削除</button>
        <button class="btn ghost" id="clearAll" type="button">🗑️ すべて削除</button>
      </div>
    </section>

    <section class="panel fade-in">
      <h3><span class="icon gold">💡</span>ヒント</h3>
      <div class="notice">
        <span>📌</span>
        <span>レシピページで「この献立を作る」を押すと、材料が自動でリストに追加されます。タップでチェックのON/OFFができます。</span>
      </div>
    </section>
  </main>

  <nav class="nav">
    <a href="index.html"><span class="nav-icon">🏠</span><span class="nav-label">ホーム</span></a>
    <a href="profile.html"><span class="nav-icon">👨‍👩‍👧</span><span class="nav-label">プロフィール</span></a>
    <a href="menu.html"><span class="nav-icon">🍽️</span><span class="nav-label">献立</span></a>
    <a class="active" href="shopping.html"><span class="nav-icon">🛒</span><span class="nav-label">買い物</span></a>
    <a href="history.html"><span class="nav-icon">📖</span><span class="nav-label">記録</span></a>
  </nav>

  <script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
